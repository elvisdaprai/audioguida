<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Mappa del percorso</title>

  <!-- CSS aggiornato con trucco anti-cache -->
  <link rel="stylesheet" href="style.css?v=2">

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      padding: 10px;
      font-size: 1.6em;
    }

    #map {
      height: 90vh; /* mappa più grande */
      width: 100%;
    }

    a, button {
      display: block;
      text-align: center;
      margin: 15px;
      font-size: 1.4em;
      padding: 12px 20px;
      border-radius: 12px;
      background-color: #2b7de9;
      color: white;
      border: none;
      cursor: pointer;
      text-decoration: none;
    }

    a:hover, button:hover {
      background-color: #1a5bb8;
    }
  </style>
</head>
<body>

  <h1>🗺️ Percorso della visita</h1>

  <div id="map"></div>

  <a href="index.html">⬅️ Torna alla Home</a>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // 1️⃣ Creiamo la mappa centrata sulla città (esempio Milano)
    var map = L.map('map').setView([45.4642, 9.1900], 14);

    // 2️⃣ Carichiamo la mappa OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    // 3️⃣ Marker delle tappe con popup grandi
    L.marker([45.4642, 9.1900])
      .addTo(map)
      .bindPopup('<div style="font-size:1.4em; font-weight:bold; color:#333;">📍 Duomo di Milano</div>');

    L.marker([45.4670, 9.1890])
      .addTo(map)
      .bindPopup('<div style="font-size:1.4em; font-weight:bold; color:#333;">📍 Galleria Vittorio Emanuele II</div>');

    L.marker([45.4685, 9.1815])
      .addTo(map)
      .bindPopup('<div style="font-size:1.4em; font-weight:bold; color:#333;">📍 Castello Sforzesco</div>');

    // 4️⃣ Mostriamo la posizione dell'utente
    map.locate({setView: true, maxZoom: 16, timeout: 10000, enableHighAccuracy: true});

    function onLocationFound(e) {
      var radius = e.accuracy;
      L.marker(e.latlng).addTo(map)
        .bindPopup("Sei qui! (circa " + Math.round(radius) + " metri)").openPopup();
    }

    map.on('locationfound', onLocationFound);

    function onLocationError(e) {
      alert("Impossibile ottenere la posizione: " + e.message);
    }

    map.on('locationerror', onLocationError);
  </script>

</body>
</html>


</body>
</html>
