<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Percorso audioguida Venezia</title>

  <!-- CSS aggiornato -->
  <link rel="stylesheet" href="style.css?v=5">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      font-size: 1.6em;
      padding: 10px;
    }

    #map {
      height: 88vh;
      width: 100%;
    }

    a {
      display: block;
      margin: 12px;
      padding: 14px;
      text-align: center;
      font-size: 1.4em;
      background-color: #2b7de9;
      color: white;
      text-decoration: none;
      border-radius: 12px;
    }
  </style>
</head>
<body>

<h1>🚶‍♂️ Percorso audioguida Venezia</h1>

<div id="map"></div>

<a href="index.html">⬅️ Torna alla Home</a>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // 1️⃣ Inizializza mappa
  var map = L.map('map').setView([45.4380, 12.3350], 15);

  // 2️⃣ Tile OpenStreetMap
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // 3️⃣ Marker delle tappe
  var tappe = [
    { nome: "1️⃣ Stazione Santa Lucia", coord: [45.4419, 12.3216] },
    { nome: "2️⃣ Ponte di Rialto", coord: [45.4380, 12.3358] },
    { nome: "3️⃣ Mercato di Rialto", coord: [45.4392, 12.3349] },
    { nome: "4️⃣ Piazza San Marco", coord: [45.4340, 12.3399] },
    { nome: "5️⃣ Basilica di San Marco", coord: [45.4345, 12.3399] },
    { nome: "6️⃣ Campo Santa Margherita", coord: [45.4336, 12.3217] },
    { nome: "7️⃣ Ritorno alla Stazione", coord: [45.4419, 12.3216] }
  ];

  // Aggiungi marker con popup
  tappe.forEach(tappa => {
    L.marker(tappa.coord)
      .addTo(map)
      .bindPopup(`<div style="font-size:1.4em; font-weight:bold;">${tappa.nome}</div>`);
  });

  // 4️⃣ Polyline manuale (percorsi pedonali)
  // Lista di coordinate intermedie per seguire calli e ponti di Venezia
  var percorso = [
    // Stazione → Ponte di Rialto
    [45.4419, 12.3216], [45.4415, 12.3240], [45.4405, 12.3275],
    [45.4395, 12.3305], [45.4387, 12.3340], [45.4380, 12.3358],
    // Rialto → Mercato
    [45.4380, 12.3358], [45.4385, 12.3352], [45.4392, 12.3349],
    // Mercato → Piazza San Marco
    [45.4392, 12.3349], [45.4388, 12.3355], [45.4375, 12.3370],
    [45.4360, 12.3385], [45.4340, 12.3399],
    // Piazza San Marco → Basilica di San Marco
    [45.4340, 12.3399], [45.4343, 12.3398], [45.4345, 12.3399],
    // Basilica → Campo Santa Margherita
    [45.4345, 12.3399], [45.4350, 12.3385], [45.4360, 12.3365],
    [45.4368, 12.3345], [45.4378, 12.3325], [45.4385, 12.3300],
    [45.4390, 12.3275], [45.4400, 12.3250], [45.4410, 12.3230],
    [45.4336, 12.3217],
    // Campo Santa Margherita → Stazione
    [45.4336, 12.3217], [45.4350, 12.3220], [45.4365, 12.3230],
    [45.4380, 12.3240], [45.4395, 12.3255], [45.4419, 12.3216]
  ];

  // Aggiungi Polyline alla mappa
  L.polyline(percorso, { color: '#007bff', weight: 6 }).addTo(map);

  // 5️⃣ Posizione GPS utente
  map.locate({ setView: false, enableHighAccuracy: true });

  map.on('locationfound', function(e) {
    L.marker(e.latlng)
      .addTo(map)
      .bindPopup("📍 Sei qui")
      .openPopup();
  });

  map.on('locationerror', function(e) {
    console.warn("GPS non disponibile: " + e.message);
  });
</script>

</body>
</html>


</body>
</html>
