<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Percorso audioguida Venezia</title>

  <!-- CSS con anti-cache -->
  <link rel="stylesheet" href="style.css?v=4">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Leaflet Routing Machine -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      font-size: 1.6em;
      padding: 10px;
    }

    #map {
      height: 88vh;
      width: 100%;
    }

    a {
      display: block;
      margin: 12px;
      padding: 14px;
      text-align: center;
      font-size: 1.4em;
      background-color: #2b7de9;
      color: white;
      text-decoration: none;
      border-radius: 12px;
    }
  </style>
</head>
<body>

<h1>🚶‍♂️ Percorso audioguida Venezia</h1>

<div id="map"></div>

<a href="index.html">⬅️ Torna alla Home</a>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

<script>
  // Inizializza mappa
  var map = L.map('map').setView([45.4419, 12.3216], 14);

  // OpenStreetMap
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // Coordinate tappe
  var tappe = [
    { nome: "1️⃣ Stazione Santa Lucia", coord: [45.4419, 12.3216] },
    { nome: "2️⃣ Ponte di Rialto", coord: [45.4380, 12.3358] },
    { nome: "3️⃣ Mercato di Rialto", coord: [45.4392, 12.3349] },
    { nome: "4️⃣ Piazza San Marco", coord: [45.4340, 12.3399] },
    { nome: "5️⃣ Basilica di San Marco", coord: [45.4345, 12.3399] },
    { nome: "6️⃣ Campo Santa Margherita", coord: [45.4336, 12.3217] },
    { nome: "7️⃣ Ritorno alla Stazione", coord: [45.4419, 12.3216] }
  ];

  // Aggiungi marker con popup
  tappe.forEach(tappa => {
    L.marker(tappa.coord)
      .addTo(map)
      .bindPopup(`<div style="font-size:1.4em; font-weight:bold;">${tappa.nome}</div>`);
  });

  // Funzione per creare routing tratti consecutivi
  function creaTratto(start, end) {
    L.Routing.control({
      waypoints: [
        L.latLng(start[0], start[1]),
        L.latLng(end[0], end[1])
      ],
      createMarker: () => null, // marker proprio
      lineOptions: { styles: [{ color: '#007bff', weight: 6 }] },
      addWaypoints: false,
      draggableWaypoints: false,
      routeWhileDragging: false,
      show: false,
      router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' })
    }).addTo(map);
  }

  // Crea tutti i tratti consecutivi
  for (let i = 0; i < tappe.length - 1; i++) {
    creaTratto(tappe[i].coord, tappe[i+1].coord);
  }

  // GPS utente
  map.locate({ setView: false, enableHighAccuracy: true });

  map.on('locationfound', function(e) {
    L.marker(e.latlng)
      .addTo(map)
      .bindPopup("📍 Sei qui")
      .openPopup();
  });

  map.on('locationerror', function(e) {
    console.warn("GPS non disponibile: " + e.message);
  });

</script>

</body>
</html>
